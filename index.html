<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Neha & Prajwal — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Cormorant+SC:wght@300;400;500;600&family=Pinyon+Script&family=Italianno&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #fdf6f0;
    --cream-deep: #f7e9df;
    --blush-light: #f6d6d6;
    --blush: #e8b4b8;
    --rose: #c97d8e;
    --rose-deep: #a85267;
    --wine: #5b2334;
    --wine-deep: #3a1620;
    --gold: #c9a96e;
    --gold-deep: #8a7548;
    --gold-light: #e7d3a8;
    --ink: #4a2730;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 20% 0%, #fbe4dc 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, #f5d4d4 0%, transparent 55%),
      linear-gradient(180deg, #fdf6f0 0%, #f9ebe5 50%, #fdf6f0 100%);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Subtle paper texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(201,169,110,0.05) 0%, transparent 30%),
      radial-gradient(circle at 75% 70%, rgba(168,82,103,0.05) 0%, transparent 30%);
    z-index: 1;
  }

  /* Ambient floating hearts/petals layer */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .ambient .float {
    position: absolute;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.55; }
    50%  { opacity: 0.5; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  #app {
    position: relative;
    z-index: 3;
    min-height: 100vh;
  }

  /* ============= ENVELOPE ============= */
  .stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
    perspective: 1400px;
  }

  .envelope-wrap {
    position: relative;
    width: min(92vw, 420px);
    aspect-ratio: 1 / 1.42;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(.6,.05,.3,1), opacity .8s ease;
  }

  .envelope-wrap.opening { transform: translateY(-15px) scale(1.02); }
  .envelope-wrap.gone {
    opacity: 0;
    transform: translateY(-40px) scale(.92);
    pointer-events: none;
    transition: opacity .5s ease, transform .6s cubic-bezier(.6,.05,.3,1);
  }

  .envelope {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #f8dada 0%, #eebdc1 50%, #e2a4ab 100%);
    border-radius: 6px;
    box-shadow:
      0 30px 60px -20px rgba(91,35,52,0.35),
      0 10px 25px -10px rgba(91,35,52,0.25),
      inset 0 0 0 1px rgba(255,255,255,0.5);
    overflow: hidden;
  }

  /* Subtle envelope texture */
  .envelope::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 6px),
      repeating-linear-gradient(-45deg, rgba(91,35,52,0.025) 0 2px, transparent 2px 6px);
    pointer-events: none;
  }

  /* Gold filigree border */
  .envelope-border {
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(201,169,110,0.6);
    border-radius: 3px;
    pointer-events: none;
  }
  .envelope-border::after {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px dashed rgba(201,169,110,0.35);
    border-radius: 2px;
  }

  /* Envelope flap — extends past 50% so the triangle overlaps the bottom half */
  .envelope-flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 62%;
    background: linear-gradient(180deg, #e8a5ab 0%, #d68a92 100%);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transition: transform .7s cubic-bezier(.6,.05,.3,1);
    z-index: 5;
    box-shadow: inset 0 -10px 20px -10px rgba(91,35,52,0.3);
  }
  .envelope-flap::after {
    content: '';
    position: absolute;
    inset: 14px 14px 14px 14px;
    border: 1px solid rgba(201,169,110,0.55);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }

  .envelope-wrap.opening .envelope-flap,
  .envelope-wrap.revealed .envelope-flap,
  .envelope-wrap.gone .envelope-flap {
    transform: rotateX(-180deg);
  }

  /* Wax seal — sits at the V-tip of the closed flap */
  .wax-seal {
    position: absolute;
    top: calc(62% - 76px);
    left: 50%;
    transform: translateX(-50%);
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #c97d8e 0%, #a85267 45%, #7d2f44 100%);
    box-shadow:
      0 6px 14px rgba(91,35,52,0.5),
      inset 0 -4px 8px rgba(0,0,0,0.25),
      inset 0 4px 6px rgba(255,255,255,0.2);
    display: grid;
    place-items: center;
    z-index: 6;
    font-family: 'Pinyon Script', cursive;
    color: #f5d4d4;
    font-size: 28px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    transition: transform .8s ease, opacity .6s ease;
    animation: sealPulse 1.8s ease-in-out infinite;
    cursor: pointer;
  }
  .wax-seal::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid rgba(245,212,212,0.4);
  }
  /* Soft glowing halo behind seal to invite tapping */
  .wax-seal::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,180,184,0.55) 0%, rgba(232,180,184,0) 65%);
    z-index: -1;
    animation: sealHalo 1.8s ease-in-out infinite;
  }
  @keyframes sealPulse {
    0%, 100% {
      transform: translateX(-50%) translateY(0) scale(1);
      box-shadow:
        0 6px 14px rgba(91,35,52,0.5),
        inset 0 -4px 8px rgba(0,0,0,0.25),
        inset 0 4px 6px rgba(255,255,255,0.2);
    }
    50% {
      transform: translateX(-50%) translateY(-4px) scale(1.06);
      box-shadow:
        0 12px 22px rgba(91,35,52,0.55),
        0 0 0 6px rgba(232,180,184,0.25),
        inset 0 -4px 8px rgba(0,0,0,0.25),
        inset 0 4px 6px rgba(255,255,255,0.25);
    }
  }
  @keyframes sealHalo {
    0%, 100% { opacity: 0.5; transform: scale(0.9); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }
  .envelope-wrap.opening .wax-seal,
  .envelope-wrap.revealed .wax-seal,
  .envelope-wrap.gone .wax-seal {
    animation: none;
    transform: translateX(-50%) scale(.6) rotate(-25deg);
    opacity: 0;
  }

  /* Hint below the envelope */
  .open-hint {
    margin-top: 26px;
    text-align: center;
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--rose-deep);
    opacity: 0.85;
  }
  .open-hint span {
    display: inline-block;
    animation: nudge 1.8s ease-in-out infinite;
  }
  @keyframes nudge {
    0%, 100% { transform: translateY(0); opacity: 0.7; }
    50%      { transform: translateY(-3px); opacity: 1; }
  }

  /* (letter-peek styles removed — envelope is fully closed until tapped) */

  /* Envelope body (front pocket triangle) — V-tip raised to match flap apex at 62% */
  .envelope-pocket {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
  }
  .envelope-pocket::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 62%, #e2a4ab 62%);
    clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
  }
  .envelope-pocket::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #f0bcc1 0%, #d68a92 100%);
    clip-path: polygon(0 100%, 50% 62%, 100% 100%);
    box-shadow: inset 0 6px 12px -4px rgba(91,35,52,0.25);
  }

  /* ============= INVITE LETTER (inside envelope, pops out) ============= */
  .letter {
    position: absolute;
    top: 10%;
    left: 8%;
    right: 8%;
    height: 70%;
    background: linear-gradient(180deg, #fdf6f0 0%, #faeee4 100%);
    border-radius: 4px;
    box-shadow:
      0 14px 28px -10px rgba(91,35,52,0.35),
      0 4px 10px rgba(91,35,52,0.18),
      inset 0 0 0 1px rgba(201,169,110,0.4);
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 26px 18px;
    text-align: center;
    opacity: 0;
    transform: translateY(20px) scale(0.94);
    transition:
      transform 1.3s cubic-bezier(.2,.7,.3,1),
      opacity .9s ease;
  }
  /* When flap opens, letter is revealed inside (still behind pocket) */
  .envelope-wrap.opening .letter {
    opacity: 1;
    transform: translateY(0) scale(1);
    transition:
      transform .5s cubic-bezier(.2,.7,.3,1) .2s,
      opacity .4s ease .2s;
  }
  /* When 'revealed', letter pops out: scales up, stays centered on screen */
  .envelope-wrap.revealed .letter,
  .envelope-wrap.gone .letter {
    opacity: 1;
    z-index: 8;
    transform: translateY(0) scale(1.18);
    transition:
      transform .8s cubic-bezier(.2,.7,.3,1),
      opacity .4s ease;
  }

  .letter::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(201,169,110,0.5);
    border-radius: 3px;
    pointer-events: none;
  }
  .letter::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1px dashed rgba(201,169,110,0.3);
    border-radius: 2px;
    pointer-events: none;
  }

  .letter-corner {
    position: absolute;
    width: 38px;
    height: 38px;
    pointer-events: none;
  }
  .letter-corner.tl { top: 8px; left: 8px; }
  .letter-corner.tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .letter-corner.bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .letter-corner.br { bottom: 8px; right: 8px; transform: scale(-1,-1); }

  .letter-eyebrow {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.5em;
    color: var(--gold-deep);
    margin-top: 4px;
  }
  .letter-rule {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
    margin: 14px auto;
  }
  .letter-names {
    font-family: 'Pinyon Script', cursive;
    font-size: 44px;
    line-height: 1;
    color: var(--wine);
    margin: 4px 0;
  }
  .letter-date {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--rose-deep);
    margin-top: 2px;
  }

  /* ============= UNFOLDED CARD ============= */
  .card-wrap {
    width: min(94vw, 460px);
    margin: 0 auto;
    padding: 40px 0 80px;
  }

  .section {
    background: linear-gradient(180deg, #fdf6f0 0%, #faeee4 100%);
    border-radius: 8px;
    padding: 40px 28px;
    margin-bottom: 22px;
    position: relative;
    box-shadow:
      0 22px 50px -25px rgba(91,35,52,0.3),
      0 8px 20px -10px rgba(91,35,52,0.15),
      inset 0 0 0 1px rgba(201,169,110,0.18);
    opacity: 0;
    transform: translateY(30px);
    transition: opacity .9s ease, transform .9s cubic-bezier(.2,.7,.3,1);
  }
  .section.visible { opacity: 1; transform: translateY(0); }

  .section-frame {
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(201,169,110,0.45);
    border-radius: 4px;
    pointer-events: none;
  }
  .section-frame::after {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(201,169,110,0.18);
    border-radius: 2px;
  }

  /* Corner florals reused across sections */
  .corner-floral {
    position: absolute;
    width: 64px;
    height: 64px;
    opacity: 0.7;
    pointer-events: none;
  }
  .corner-floral.tl { top: 4px; left: 4px; }
  .corner-floral.tr { top: 4px; right: 4px; transform: scaleX(-1); }
  .corner-floral.bl { bottom: 4px; left: 4px; transform: scaleY(-1); }
  .corner-floral.br { bottom: 4px; right: 4px; transform: scale(-1,-1); }

  /* Newari torana arch decoration on top */
  .torana {
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 320px;
    height: 36px;
    opacity: 0.8;
  }

  /* ============= COVER ============= */
  .cover-title {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.5em;
    color: var(--gold-deep);
    text-align: center;
    margin: 30px 0 6px;
  }
  .cover-invite {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    color: var(--ink);
    text-align: center;
    line-height: 1.7;
    margin: 16px 24px;
    opacity: 0.85;
  }
  .names {
    font-family: 'Pinyon Script', cursive;
    text-align: center;
    color: var(--wine);
    line-height: 1;
    margin: 26px 0 16px;
  }
  .names .first { font-size: clamp(54px, 14vw, 72px); display: block; }
  .names .amp {
    font-family: 'Italianno', cursive;
    font-size: clamp(70px, 16vw, 88px);
    color: var(--rose);
    display: block;
    line-height: 0.6;
    margin: -8px 0 -8px;
  }
  .names .second { font-size: clamp(54px, 14vw, 72px); display: block; }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 22px 0;
  }
  .ornament-line {
    height: 1px;
    width: 60px;
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
  }
  .ornament-diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 0 2px rgba(201,169,110,0.2);
  }

  .date-pill {
    text-align: center;
    margin: 14px 0;
  }
  .date-day {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--rose-deep);
  }
  .date-number {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 56px;
    line-height: 1;
    color: var(--wine);
    margin: 6px 0 4px;
  }
  .date-month {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--rose-deep);
  }
  .date-bs {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--gold-deep);
    margin-top: 8px;
  }

  /* ============= COUPLE PORTRAIT ============= */
  .portrait-frame {
    position: relative;
    width: 84%;
    margin: 12px auto 18px;
    aspect-ratio: 3 / 4;
  }
  .portrait-frame::before {
    /* Newari torana arch above portrait */
    content: '';
    position: absolute;
    top: -12px;
    left: -8px;
    right: -8px;
    height: 60px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 60'><path d='M10 55 Q10 5 100 5 Q190 5 190 55' stroke='%23c9a96e' stroke-width='1.2' fill='none'/><path d='M16 55 Q16 11 100 11 Q184 11 184 55' stroke='%23c9a96e' stroke-width='0.6' fill='none' stroke-dasharray='2 3'/></svg>") no-repeat center bottom / contain;
    opacity: 0.7;
    pointer-events: none;
  }
  .portrait-arch {
    position: absolute;
    inset: 0;
    border-radius: 50% 50% 8px 8px / 35% 35% 8px 8px;
    overflow: hidden;
    background: var(--blush);
    box-shadow:
      0 14px 30px -12px rgba(91,35,52,0.45),
      inset 0 0 0 6px var(--cream),
      inset 0 0 0 7px var(--gold);
  }
  .portrait-arch img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
    /* pinkish tint */
    filter: saturate(1.1) contrast(1.02);
  }
  .portrait-arch::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.15) 0%, transparent 55%),
      linear-gradient(180deg, rgba(232,180,184,0.18) 0%, rgba(201,125,142,0.28) 100%);
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  .quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 17px;
    line-height: 1.55;
    text-align: center;
    color: var(--wine);
    margin: 14px 22px 6px;
    text-wrap: pretty;
  }
  .quote .glyph {
    font-family: 'Pinyon Script', cursive;
    color: var(--rose);
    font-size: 28px;
    line-height: 0;
    vertical-align: -2px;
  }
  .quote-attr {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--gold-deep);
    text-align: center;
    margin-top: 14px;
  }

  /* ============= COUNTDOWN ============= */
  .countdown-label {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--rose-deep);
    text-align: center;
    margin-top: 28px;
  }
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 22px 6px 20px;
  }
  .cd-cell {
    background: linear-gradient(180deg, #fbe7e1 0%, #f4cfcf 100%);
    border-radius: 6px;
    padding: 14px 4px 10px;
    text-align: center;
    box-shadow:
      inset 0 0 0 1px rgba(201,169,110,0.4),
      0 4px 10px -6px rgba(91,35,52,0.25);
    position: relative;
  }
  .cd-cell::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 4px;
    pointer-events: none;
  }
  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 28px;
    line-height: 1;
    color: var(--wine);
    font-variant-numeric: tabular-nums;
  }
  .cd-label {
    font-family: 'Cormorant SC', serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--rose-deep);
    margin-top: 6px;
  }

  /* ============= DETAILS ============= */
  .detail-row {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 14px;
    align-items: start;
    margin: 18px 8px;
  }
  .detail-icon {
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    color: var(--rose);
  }
  .detail-key {
    font-family: 'Cormorant SC', serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--gold-deep);
    margin-bottom: 4px;
  }
  .detail-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--wine);
    line-height: 1.4;
  }
  .detail-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink);
    opacity: 0.7;
    margin-top: 2px;
  }

  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 26px;
    padding: 10px 22px;
    border: 1px solid var(--gold);
    border-radius: 999px;
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--wine);
    text-decoration: none;
    background: rgba(255,255,255,0.4);
    transition: all .3s ease;
  }
  .map-link:hover {
    background: var(--gold);
    color: var(--cream);
  }
  .map-link-wrap { text-align: center; margin-top: 4px; }

  /* ============= CLOSING ============= */
  .closing-quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 20px;
    text-align: center;
    color: var(--wine);
    line-height: 1.55;
    margin: 24px 18px;
    text-wrap: balance;
  }
  .signature {
    font-family: 'Pinyon Script', cursive;
    color: var(--rose-deep);
    font-size: 32px;

  <script>
    // Ambient floating hearts/petals
    (function() {
      const layer = document.getElementById('ambient');
      const HEARTS = 14;
      const heartSvg = (color) => `<svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M12 21s-7.5-4.7-9.5-9.5C1.3 8.2 3.4 4.5 6.8 4.5c2 0 3.5 1.1 5.2 3 1.7-1.9 3.2-3 5.2-3 3.4 0 5.5 3.7 4.3 7-2 4.8-9.5 9.5-9.5 9.5z" fill="${color}" opacity="0.85"/></svg>`;
      const petalSvg = (color) => `<svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M12 2 C 8 6, 6 12, 12 22 C 18 12, 16 6, 12 2 Z" fill="${color}" opacity="0.7"/></svg>`;
      const colors = ['#e8b4b8', '#c97d8e', '#f6d6d6', '#c9a96e'];
      for (let i = 0; i < HEARTS; i++) {
        const el = document.createElement('div');
        el.className = 'float';
        const size = 10 + Math.random() * 18;
        const left = Math.random() * 100;
        const dur = 14 + Math.random() * 16;
        const delay = -Math.random() * 30;
        const color = colors[i % colors.length];
        el.style.left = left + 'vw';
        el.style.bottom = '-20px';
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.animationDuration = dur + 's';
        el.style.animationDelay = delay + 's';
        el.innerHTML = (i % 3 === 0) ? petalSvg(color) : heartSvg(color);
        layer.appendChild(el);
      }
    })();
  </script>
